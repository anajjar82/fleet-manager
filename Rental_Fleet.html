<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f6ff;--bg2:#e8f2ff;--surface:#fff;--surface2:#f5f9ff;
  --border:#c8ddf5;--border2:#a8c8f0;
  --blue:#1a6fdb;--blue2:#2d8bff;--blue-light:#dbeeff;--blue-pale:#eef6ff;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#d97706;--amber-light:#fef3c7;
  --orange:#ea580c;--orange-light:#ffedd5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#000;min-height:100vh;font-size:14px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1255b8,#1a6fdb 60%,#2d8bff);color:#fff;padding:0 1.5rem;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(26,111,219,.3);position:sticky;top:0;z-index:200;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid rgba(255,255,255,.25);}
.brand-name{font-size:.98rem;font-weight:800;letter-spacing:-.02em;}
.brand-sub{font-size:.6rem;opacity:.85;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;}
.hdr-right{display:flex;align-items:center;gap:.5rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:2px solid var(--border);}
.stat{padding:.85rem 1.25rem;border-right:1px solid var(--border);position:relative;overflow:hidden;transition:background .15s;}
.stat:last-child{border-right:none;}
.stat:hover{background:var(--blue-pale);}
.stat-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#000;margin-bottom:3px;}
.stat-val{font-size:1.7rem;font-weight:900;line-height:1;font-family:'JetBrains Mono',monospace;}
.stat-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 2px 2px 0;transition:width .6s ease;}
.stat.tot  .stat-val{color:var(--blue);}  .stat.tot  .stat-bar{background:var(--blue);}
.stat.asgn .stat-val{color:var(--green);} .stat.asgn .stat-bar{background:var(--green);}
.stat.idle .stat-val{color:var(--orange);}.stat.idle .stat-bar{background:var(--orange);}
.stat.proj .stat-val{color:#7c3aed;}      .stat.proj .stat-bar{background:#7c3aed;width:100%;}

/* TOOLBAR */
.toolbar{padding:.7rem 1.5rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;background:var(--surface2);border-bottom:1px solid var(--border);}
.srch{flex:1;min-width:240px;position:relative;}
.srch input{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:.5rem .85rem .5rem 2.2rem;color:#000;font-family:'Inter',sans-serif;font-size:.83rem;transition:border-color .2s,box-shadow .2s;}
.srch input:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(45,139,255,.12);}
.srch input::placeholder{color:#999;}
.srch-ic{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:#999;}
select.flt{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:.5rem .85rem;color:#000;font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;}
select.flt:focus{outline:none;border-color:var(--blue2);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:.45rem .9rem;border-radius:8px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:#1255b8;}
.btn-danger{background:var(--red);color:#fff;}.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:#fff;color:#000;border:1.5px solid var(--border);}.btn-ghost:hover{background:var(--blue-pale);border-color:var(--border2);}
.btn-warn{background:var(--amber-light);color:#000;border:1.5px solid #fcd34d;}.btn-warn:hover{background:#fde68a;}
.btn-sm{padding:.28rem .6rem;font-size:.7rem;border-radius:6px;}
.btn-icon{padding:.35rem .5rem;}

.info-row{padding:.4rem 1.5rem;font-size:.72rem;color:#000;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.info-row b{color:var(--blue);font-family:'JetBrains Mono',monospace;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead th{background:var(--surface2);padding:.62rem .85rem;text-align:left;font-size:.63rem;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:background .15s;}
thead th:hover{background:var(--blue-light);}
thead th.sort-asc::after{content:' ↑';color:var(--blue);}
thead th.sort-desc::after{content:' ↓';color:var(--blue);}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
tbody tr:nth-child(even){background:var(--bg2);}
tbody tr:hover{background:var(--blue-light)!important;}
tbody td{padding:.62rem .85rem;vertical-align:middle;white-space:nowrap;color:#000;}

.plate{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;color:#000;background:var(--blue-pale);border:1.5px solid var(--border2);padding:3px 10px;border-radius:5px;display:inline-block;letter-spacing:.06em;}
.badge{padding:3px 10px;border-radius:20px;font-size:.63rem;font-weight:700;text-transform:uppercase;display:inline-block;color:#000;}
.b-asgn{background:var(--green-light);border:1px solid #6ee7b7;}
.b-idle{background:var(--orange-light);border:1px solid #fdba74;}
.proj-cell{max-width:210px;overflow:hidden;text-overflow:ellipsis;font-size:.78rem;}
.name-cell{font-weight:600;font-size:.82rem;max-width:185px;overflow:hidden;text-overflow:ellipsis;}
.role-cell{font-size:.75rem;max-width:155px;overflow:hidden;text-overflow:ellipsis;}
.ph-link{color:#000;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.73rem;}
.ph-link:hover{text-decoration:underline;}
.mono-cell{font-family:'JetBrains Mono',monospace;font-size:.75rem;}
.acts{display:flex;gap:3px;}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(15,42,74,.4);backdrop-filter:blur(5px);z-index:500;align-items:center;justify-content:center;padding:1rem;}
.ov.open{display:flex;}
.modal{background:#fff;border:1.5px solid var(--border2);border-radius:16px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(26,111,219,.18);}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.m-head{padding:1.1rem 1.5rem;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--blue-pale),#fff);border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10;}
.m-title{font-size:.95rem;font-weight:800;color:#000;display:flex;align-items:center;gap:8px;}
.m-close{background:none;border:none;color:#666;font-size:1.2rem;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .15s;line-height:1;}
.m-close:hover{background:var(--red-light);color:var(--red);}
.m-body{padding:1.4rem 1.5rem;}
.m-foot{padding:.9rem 1.5rem;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:0 0 16px 16px;position:sticky;bottom:0;}

.f-sec{margin-bottom:1.3rem;}
.f-sec-title{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#000;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--blue-light);}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.f-grid.three{grid-template-columns:1fr 1fr 1fr;}
.f-full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:.62rem;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select{background:#fff;border:1.5px solid var(--border);border-radius:7px;padding:.48rem .75rem;color:#000;font-family:'Inter',sans-serif;font-size:.83rem;transition:border-color .15s,box-shadow .15s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(45,139,255,.1);}
.field input::placeholder{color:#aaa;}
.mono-in{font-family:'JetBrains Mono',monospace!important;font-size:.78rem!important;}

/* autofill highlight */
.autofilled{
  background:#ecfdf5!important;
  border-color:#10b981!important;
  box-shadow:0 0 0 3px rgba(16,185,129,.15)!important;
  animation:pulseGreen .5s ease;
}
@keyframes pulseGreen{
  0%{background:#bbf7d0;border-color:#10b981;}
  100%{background:#ecfdf5;border-color:#10b981;}
}

/* Personnel No field with lookup indicator */
.pn-wrap{position:relative;}
.pn-wrap input{padding-right:2rem!important;}
.pn-status{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;font-weight:700;}

/* Detail */
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.d-sec{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#000;margin:1.1rem 0 .6rem;padding-bottom:4px;border-bottom:2px solid var(--blue-light);}
.d-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#555;margin-bottom:2px;}
.d-val{font-size:.88rem;font-weight:600;color:#000;}
.d-full{grid-column:1/-1;}

.conf-modal{max-width:400px;}
.conf-body{padding:2rem 1.5rem;text-align:center;}
.conf-icon{font-size:2.5rem;margin-bottom:.7rem;}
.conf-title{font-size:1rem;font-weight:800;color:#000;margin-bottom:.4rem;}
.conf-msg{font-size:.83rem;color:#333;line-height:1.55;}
.conf-foot{padding:.9rem 1.5rem;border-top:1.5px solid var(--border);display:flex;gap:.5rem;justify-content:center;}

.toasts{position:fixed;bottom:1.4rem;right:1.4rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;}
.toast{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:.65rem 1rem;font-size:.81rem;font-weight:600;color:#000;display:flex;align-items:center;gap:8px;min-width:220px;animation:tIn .3s ease;box-shadow:0 4px 16px rgba(26,111,219,.15);}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--blue);}
@keyframes tIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
@keyframes tOut{to{opacity:0;transform:translateX(16px);}}

.empty{text-align:center;padding:4rem 2rem;color:#555;}
.empty-ic{font-size:2.5rem;margin-bottom:.7rem;opacity:.5;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.f-grid,.f-grid.three,.d-grid{grid-template-columns:1fr;}}
</style>
</head>

// ── PERSONNEL AUTOFILL ──
function lookupPersonnel(val){
  const pn = val.trim();
  const statusEl = document.getElementById('pnStatus');

  // Clear if empty
  if(!pn){
    statusEl.textContent = '';
    clearPersonnelFields();
    return;
  }

  const person = PERSONNEL[pn];
  if(person){
    fillField('fNm', person.name);
    fillField('fNI', person.nationalId);
    fillField('fRo', person.profession);
    fillField('fPh', person.phone);
    statusEl.textContent = '✅';
    showBanner();
  } else {
    statusEl.textContent = pn.length >= 4 ? '❌' : '';
    clearPersonnelFields();
  }
}

function fillField(id, value){
  const el = document.getElementById(id);
  el.value = value || '';
  el.classList.remove('autofilled');
  // force reflow so animation restarts
  void el.offsetWidth;
  el.classList.add('autofilled');
}

function clearPersonnelFields(){
  ['fNm','fNI','fRo','fPh'].forEach(id=>{
    const el=document.getElementById(id);
    el.value='';
    el.classList.remove('autofilled');
  });
}

let bannerTimer=null;
function showBanner(){
  let b=document.getElementById('autofillBanner');
  if(!b){
    b=document.createElement('div');
    b.id='autofillBanner';
    b.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:.5rem 1.2rem;border-radius:20px;font-size:.8rem;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:bannerIn .3s ease';
    b.textContent='✅ Personnel found — fields auto-filled';
    document.body.appendChild(b);
    if(!document.getElementById('bannerStyle')){
      const s=document.createElement('style');
      s.id='bannerStyle';
      s.textContent='@keyframes bannerIn{from{opacity:0;top:60px}to{opacity:1;top:70px}}@keyframes bannerOut{to{opacity:0;top:60px}}';
      document.head.appendChild(s);
    }
  }
  b.style.animation='bannerIn .3s ease';
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>{
    b.style.animation='bannerOut .3s ease forwards';
    setTimeout(()=>{if(b)b.remove();},300);
  },2200);
}

// ── FILTER ──
function getF(){
  const q    = document.getElementById('q').value.toLowerCase().trim();
  const fS   = document.getElementById('fS').value;
  const fY   = document.getElementById('fY').value;
  const fPrj = document.getElementById('fPrj').value;
  return data.filter(v=>{
    if(q&&![v.plateEn,v.name,v.project,v.chassis,v.nationalId,v.profession,v.phone,v.personnelNo,v.file].some(f=>(f||'').toLowerCase().includes(q)))return false;
    if(fS  && v.status!==fS) return false;
    if(fY  && v.year.toString()!==fY) return false;
    if(fPrj && v.project!==fPrj) return false;
    return true;
  });
}

// ── RENDER ──
function render(){
  const rows=getF();
  rows.sort((a,b)=>{
    const av=(a[sf]||'').toString().toLowerCase(),bv=(b[sf]||'').toString().toLowerCase();
    return av<bv?-sd:av>bv?sd:0;
  });

  const tot  = data.length;
  const asgn = data.filter(v=>v.status==='Assign to project').length;
  const idle = data.filter(v=>v.status==='Idle').length;
  const projs= new Set(data.map(v=>v.project).filter(p=>p&&!p.startsWith('000000'))).size;

  document.getElementById('s-tot').textContent   = tot;
  document.getElementById('s-asgn').textContent  = asgn;
  document.getElementById('s-idle').textContent  = idle;
  document.getElementById('s-proj').textContent  = projs;
  document.getElementById('b-asgn').style.width  = (asgn/tot*100)+'%';
  document.getElementById('b-idle').style.width  = (idle/tot*100)+'%';
  document.getElementById('shown').textContent   = rows.length;
  document.getElementById('tot-info').textContent= tot;

  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  const th=document.getElementById('th-'+sf);
  if(th) th.classList.add(sd===1?'sort-asc':'sort-desc');

  const tb=document.getElementById('tb');
  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="10"><div class="empty"><div class="empty-ic">🔍</div><div>No matching vehicles</div></div></td></tr>`;
    return;
  }
  tb.innerHTML=rows.map(v=>{
    const ia=v.status==='Assign to project';
    return`<tr>
      <td class="mono-cell" style="color:#777">${v.sr}</td>
      <td><span class="plate">${v.plateEn}</span></td>
      <td class="mono-cell">${v.year}</td>
      <td><span class="badge ${ia?'b-asgn':'b-idle'}">${ia?'Assigned':'Idle'}</span></td>
      <td><div class="proj-cell" title="${v.project||''}">${v.project||'—'}</div></td>
      <td><div class="name-cell" title="${v.name||''}">${v.name||'—'}</div></td>
      <td class="mono-cell">${v.personnelNo||'—'}</td>
      <td><div class="role-cell" title="${v.profession||''}">${v.profession||'—'}</div></td>
      <td><div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:.78rem;white-space:nowrap" title="${v.notes||''}">${v.notes||'—'}</div></td>
      <td>${v.phone?`<a class="ph-link" href="tel:+966${v.phone}">+966${v.phone}</a>`:'—'}</td>
      <td><div class="acts">
        <button class="btn btn-ghost  btn-sm btn-icon" title="View"   onclick="openDet(${v.id})">👁</button>
        <button class="btn btn-warn   btn-sm btn-icon" title="Edit"   onclick="openEdit(${v.id})">✏️</button>
        <button class="btn btn-danger btn-sm btn-icon" title="Delete" onclick="confDel(${v.id})">🗑</button>
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
}

function sortBy(f){if(sf===f)sd*=-1;else{sf=f;sd=1;}render();}

  };
  if(editId){
    const i=data.findIndex(x=>x.id===editId);
    if(i>-1)data[i]={...data[i],...v};
    toast('Vehicle updated','success');
  } else {
    data.push({id:nextId++,sr:data.length?Math.max(...data.map(d=>d.sr))+1:1,...v});
    toast('Vehicle added','success');
  }
  save();render();closeEdit();
}

// ── DETAIL ──
function openDet(id){
  const v=data.find(x=>x.id===id);if(!v)return;
  const ia=v.status==='Assign to project';
  document.getElementById('dTitle').textContent=v.plateEn+' — Details';
  document.getElementById('dBody').innerHTML=`
    <div class="d-sec">Vehicle Information</div>
    <div class="d-grid">
      <div><div class="d-lbl">Plate No.</div><div class="d-val" style="font-family:'JetBrains Mono',monospace">${v.plateEn}</div></div>
      <div><div class="d-lbl">Year</div><div class="d-val" style="font-family:'JetBrains Mono',monospace">${v.year}</div></div>
      <div class="d-full"><div class="d-lbl">Chassis / VIN</div><div class="d-val" style="font-family:'JetBrains Mono',monospace;font-size:.8rem">${v.chassis||'—'}</div></div>
      <div><div class="d-lbl">File No.</div><div class="d-val" style="font-family:'JetBrains Mono',monospace">${v.file||'—'}</div></div>

    </div>
    <div class="d-sec">Assignment</div>
    <div class="d-grid">
      <div><div class="d-lbl">Status</div><div class="d-val"><span class="badge ${ia?'b-asgn':'b-idle'}">${ia?'Assigned':'Idle'}</span></div></div>
      <div class="d-full"><div class="d-lbl">Project</div><div class="d-val">${v.project||'—'}</div></div>
    </div>
    ${v.name||v.personnelNo?`
    <div class="d-sec">Assigned Personnel</div>
    <div class="d-grid">
      <div><div class="d-lbl">Personnel No.</div><div class="d-val" style="font-family:'JetBrains Mono',monospace">${v.personnelNo||'—'}</div></div>
      <div class="d-full"><div class="d-lbl">Full Name</div><div class="d-val">${v.name||'—'}</div></div>
      <div><div class="d-lbl">National ID</div><div class="d-val" style="font-family:'JetBrains Mono',monospace">${v.nationalId||'—'}</div></div>
      <div class="d-full"><div class="d-lbl">Job Title</div><div class="d-val">${v.profession||'—'}</div></div>
      ${v.phone?`<div class="d-full"><div class="d-lbl">Phone</div><div class="d-val"><a class="ph-link" style="font-size:.88rem" href="tel:+966${v.phone}">+966${v.phone}</a></div></div>`:''}
      ${v.notes?`<div class="d-full" style="margin-top:.5rem"><div class="d-lbl">Note</div><div class="d-val">${v.notes}</div></div>`:''}
    </div>`:''}
  `;
  document.getElementById('dEditBtn').onclick=()=>openEdit(id);
  document.getElementById('dDelBtn').onclick=()=>confDel(id);
  document.getElementById('detOv').classList.add('open');
}
function closeDet(){document.getElementById('detOv').classList.remove('open');}

// ── DELETE ──
function confDel(id){
  delId=id;
  const v=data.find(x=>x.id===id);
  document.getElementById('confMsg').textContent=`Delete vehicle ${v?.plateEn||''}? This cannot be undone.`;
  document.getElementById('confOk').onclick=doDel;
  document.getElementById('confOv').classList.add('open');
}
function closeConf(){document.getElementById('confOv').classList.remove('open');delId=null;}
function doDel(){
  if(!delId)return;
  data=data.filter(x=>x.id!==delId);
  save();render();closeConf();closeDet();
  toast('Vehicle deleted','info');
}

function closeBg(e,ovId,fn){if(e.target===document.getElementById(ovId))window[fn]();}

// ── EXPORT ──
function exportCSV(){
  const cols=['sr','plateEn','year','status','project','name','personnelNo','nationalId','profession','phone','chassis','file','notes'];
  const rows=[cols.join(','),...data.map(v=>cols.map(c=>`"${(v[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download=`fleet_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV exported','success');
}

// ── TOAST ──
function toast(msg,type='info'){
  const ic={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${ic[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.animation='tOut .3s ease forwards';setTimeout(()=>el.remove(),300);},2800);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEdit();closeDet();closeConf();}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('q').focus();}
});

render();
</script>
</body>
</html>
