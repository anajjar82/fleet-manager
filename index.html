<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ✅ Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAYFljCo5BrMojIWMZ5mkZtqo6hxfE8iK8",
  authDomain: "fleet-manager-9b160.firebaseapp.com",
  projectId: "fleet-manager-9b160",
  storageBucket: "fleet-manager-9b160.appspot.com",
  messagingSenderId: "906597586610",
  appId: "1:906597586610:web:dbbffe5543c86599b19bab"
};

// ✅ Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ========================
// ✅ GLOBAL DATA
// ========================
let data = [];
let editId = null;
let delId = null;

// ========================
// ✅ REAL-TIME LOAD (BEST)
// ========================
function loadFromDB() {
  db.collection("vehicles").onSnapshot((snapshot) => {
    data = [];
    snapshot.forEach((doc) => {
      let v = doc.data();
      v.id = doc.id;
      data.push(v);
    });
    render();
  });
}

// ========================
// ✅ SAVE VEHICLE
// ========================
function saveVehicle(){
  const pe = document.getElementById('fPE').value.trim();
  if(!pe){
    toast('Plate number is required','error');
    return;
  }

  const v = {
    plateEn:pe,
    year:parseInt(document.getElementById('fYr').value),
    file:document.getElementById('fFl').value.trim(),
    chassis:document.getElementById('fCh').value.trim(),
    status:document.getElementById('fSt').value,
    project:document.getElementById('fPr').value,
    personnelNo:document.getElementById('fPN').value.trim(),
    name:document.getElementById('fNm').value.trim(),
    nationalId:document.getElementById('fNI').value.trim(),
    profession:document.getElementById('fRo').value.trim(),
    phone:document.getElementById('fPh').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    sr: Date.now()
  };

  if(editId){
    db.collection("vehicles").doc(editId).update(v)
      .then(() => toast('Vehicle updated','success'));
  } else {
    db.collection("vehicles").add(v)
      .then(() => toast('Vehicle added','success'));
  }

  closeEdit();
}

// ========================
// ✅ DELETE VEHICLE
// ========================
function doDel(){
  if(!delId) return;

  db.collection("vehicles").doc(delId).delete()
    .then(()=>{
      toast('Vehicle deleted','info');
    });

  closeConf();
  closeDet();
}

// ========================
// ✅ START APP
// ========================
loadFromDB();
</script>
