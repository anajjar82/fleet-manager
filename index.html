<!DOCTYPE html>
<html>
<head>
  <title>Fleet Manager</title>
</head>

<body>

<!-- ✅ LOGIN SCREEN -->
<div id="loginPage" style="position:fixed;inset:0;background:#f0f6ff;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:30px;border-radius:10px;width:300px">
    <h2>Login</h2>
    <input id="email" placeholder="Email" style="width:100%;margin-bottom:10px">
    <input id="password" type="password" placeholder="Password" style="width:100%;margin-bottom:10px">
    <button onclick="login()" style="width:100%">Login</button>
    <button onclick="register()" style="width:100%;margin-top:10px">Register</button>
  </div>
</div>

<h1>✅ Fleet Manager System</h1>

<button onclick="addVehicle()">Add Vehicle</button>

<ul id="list"></ul>

<!-- ✅ CORRECT FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAYFljCo5BrMojIWMZ5mkZtqo6hxfE8iK8",
  authDomain: "fleet-manager-9b160.firebaseapp.com",
  projectId: "fleet-manager-9b160"
};

// ✅ Initialize Firebase
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ REGISTER
function register(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(()=> alert("✅ User created! Now login"))
    .catch(err => alert(err.message));
}

// ✅ LOGIN
function login(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
      alert("✅ Login successful");
    })
    .catch(err => alert(err.message));
}

// ✅ AUTO LOGIN STATE
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginPage').style.display = 'none';
    loadData();
  } else {
    document.getElementById('loginPage').style.display = 'flex';
  }
});

// ✅ LOAD DATA (real-time)
function loadData(){
  db.collection("vehicles").onSnapshot(snapshot => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const v = doc.data();

      const li = document.createElement("li");
      li.textContent = v.name;
      list.appendChild(li);
    });
  });
}

// ✅ ADD VEHICLE
function addVehicle(){
  db.collection("vehicles").add({
    name: "Vehicle " + Math.floor(Math.random()*1000)
  });
}
</script>

</body>
</html>
