<!-- ✅ FIREBASE LIBRARIES (VERY IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ✅ STEP 1: CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAYFljCo5BrMojIWMZ5mkZtqo6hxfE8iK8",
  authDomain: "fleet-manager-9b160.firebaseapp.com",
  projectId: "fleet-manager-9b160"
};

// ✅ STEP 2: INIT FIREBASE
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ STEP 3: REGISTER FUNCTION
function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(function() {
      alert("✅ User created successfully");
    })
    .catch(function(error) {
      alert("❌ " + error.message);
    });
}

// ✅ STEP 4: LOGIN FUNCTION
function login() {
  alert("Button clicked ✅"); // test

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(function() {
      alert("✅ Login successful");
    })
    .catch(function(error) {
      alert("❌ " + error.message);
    });
}

// ✅ STEP 5: CHECK LOGIN STATE
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById("loginPage").style.display = "none";
    loadData();
  }
});

// ✅ STEP 6: LOAD DATA (REAL-TIME)
function loadData() {
  db.collection("vehicles").onSnapshot(function(snapshot) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(function(doc) {
      const v = doc.data();

      const li = document.createElement("li");
      li.textContent = v.name;
      list.appendChild(li);
    });
  });
}

// ✅ STEP 7: ADD VEHICLE
function addVehicle() {
  db.collection("vehicles").add({
    name: "Vehicle " + Math.floor(Math.random() * 1000)
  });
}
</script>
